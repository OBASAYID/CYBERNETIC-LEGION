# CYRUS production stack — API + Redis signaling + coturn TURN relay + Postgres.

services:
  postgres:
    image: postgres:16-alpine
    container_name: cyrus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cyrus_ai
      POSTGRES_USER: cyrus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cyrus_secure_password_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyrus -d cyrus_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  coturn:
    image: coturn/coturn:4.6.2
    container_name: cyrus-coturn
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./deploy/coturn/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod.server
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "${CYRUS_LIVE_PORT:-3020}:3020"
      - "40000-40100:40000-40100/udp"
    environment:
      NODE_ENV: production
      PORT: 3020
      CYRUS_LIVE_PORT: 3020
      REDIS_URL: redis://redis:6379
      DATABASE_URL: ${DATABASE_URL:-postgresql://cyrus:cyrus_secure_password_2026@postgres:5432/cyrus_ai}
      CYRUS_COMM_PUBLIC_TURN: "false"
      CYRUS_SFU_RTC_MIN_PORT: 40000
      CYRUS_SFU_RTC_MAX_PORT: 40100
      CYRUS_SFU_WORKER_COUNT: ${CYRUS_SFU_WORKER_COUNT:-2}
      CYRUS_SFU_MAX_PARTICIPANTS: ${CYRUS_SFU_MAX_PARTICIPANTS:-64}
      CYRUS_MAX_CONCURRENT_USERS: ${CYRUS_MAX_CONCURRENT_USERS:-500000}
      TURN_URLS: ${TURN_URLS:-}
      TURN_SECRET: ${TURN_SECRET:-}
      TURN_USERNAME: ${TURN_USERNAME:-}
      TURN_CREDENTIAL: ${TURN_CREDENTIAL:-}
      CYRUS_SFU_ANNOUNCED_IP: ${CYRUS_SFU_ANNOUNCED_IP:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://167-233-36-99.sslip.io}
      ADMIN_ACCESS_CODE: ${ADMIN_ACCESS_CODE:-71580019}
      USER_ACCESS_CODE: ${USER_ACCESS_CODE:-170392}
      SESSION_SECRET: ${SESSION_SECRET:-}
      CYRUS_COMMS_MAX_UPLOAD_BYTES: ${CYRUS_COMMS_MAX_UPLOAD_BYTES:-4294967296}
      CYRUS_COMMS_CHUNK_BYTES: ${CYRUS_COMMS_CHUNK_BYTES:-16777216}
      HTTP_KEEP_ALIVE_TIMEOUT_MS: ${HTTP_KEEP_ALIVE_TIMEOUT_MS:-600000}
      HTTP_HEADERS_TIMEOUT_MS: ${HTTP_HEADERS_TIMEOUT_MS:-610000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3020/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  caddy:
    image: caddy:2-alpine
    container_name: cyrus-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile.generated:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy

volumes:
  redis_data:
  postgres_data:
  caddy_data:
  caddy_config:

