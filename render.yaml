services:
  - type: web
    name: cybernetic-legion
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile.prod
    dockerContext: .
    healthCheckPath: /health/ready
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: CYRUS_ENABLE_PYTHON
        value: "0"
      - key: PUBLIC_BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
