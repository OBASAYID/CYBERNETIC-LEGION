services:
  - type: web
    name: cyrus-backend
    env: node
    plan: free
    buildCommand: npm install --legacy-peer-deps && pip install -r requirements.txt && npm run build
    startCommand: npm run start:all
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3200
      - key: PUBLIC_BASE_URL
        sync: false
      - key: CYRUS_AI_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: QUANTUM_BRIDGE_URL
        sync: false
      - key: COMMS_ML_URL
        sync: false
      - key: ADMIN_ACCESS_CODE
        sync: false
      - key: USER_ACCESS_CODE
        sync: false
      - key: ENCRYPTION_SECRET
        sync: false
      - key: ENCRYPTION_SALT
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
