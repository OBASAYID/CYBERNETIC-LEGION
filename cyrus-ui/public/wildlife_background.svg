<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="skyGrad" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="40%" stop-color="#0d2240"/>
      <stop offset="100%" stop-color="#020810"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8f4fd" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#b8d4f0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4a90d9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="horizonGlow" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#1a3a5c" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#0d1f35" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#020810" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="blur6" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="blur12" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="treeLine1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1f0a"/>
      <stop offset="100%" stop-color="#020a02"/>
    </linearGradient>
    <linearGradient id="treeLine2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#061406"/>
      <stop offset="100%" stop-color="#010601"/>
    </linearGradient>
    <linearGradient id="waterReflect" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d2240" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#020810" stop-opacity="0.9"/>
    </linearGradient>
    <clipPath id="screenClip">
      <rect width="1920" height="1080"/>
    </clipPath>
  </defs>

