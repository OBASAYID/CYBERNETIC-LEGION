name: Quality Gate

on:
  pull_request:
  push:
    branches: ["main", "master", "main-push"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v6
        continue-on-error: true
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r cyrus-ai/requirements.txt

      - name: Typecheck + build + contract validation
        run: npm run typecheck:all
