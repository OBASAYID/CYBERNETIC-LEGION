name: Deploy to Railway

on:
  workflow_dispatch:

jobs:
  deploy_disabled_notice:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deployment strategy notice
        run: |
          echo "Automatic CLI deploy from GitHub Actions is disabled."
          echo "Reason: this workflow can drift service manifest/build strategy."
          echo "Railway is configured to deploy from the connected GitHub repo directly."
          echo "Use Railway dashboard redeploy when needed."
