# GitHub Pages (Jekyll) — requires one-time repo setup or this job will fail at "Setup Pages":
# Settings → Pages → Build and deployment → Source: "GitHub Actions" (not "Deploy from a branch").
# First deploy may ask you to create/approve the `github-pages` environment.
#
# Runs only when you start it from the Actions tab so pushes to main do not fail CI
# before Pages is configured. To auto-deploy on doc changes, add a push trigger, e.g.:
#   push:
#     branches: [main]
#     paths: ['docs/**', '.github/workflows/pages.yml']

name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
