# coturn template — set external-ip to your server's public IPv4/IPv6.
# Generate credentials: openssl rand -hex 32  →  TURN_SECRET
listening-port=3478
tls-listening-port=5349
fingerprint
lt-cred-mech
use-auth-secret
static-auth-secret=change-me-in-production
realm=cyrus
no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1
# Uncomment and set for production:
# external-ip=PUBLIC_IPv4
min-port=49152
max-port=65535
verbose
